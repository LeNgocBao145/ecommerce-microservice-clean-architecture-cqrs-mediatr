syntax = "proto3";

option csharp_namespace = "PromotionService.WebAPI.Protos";

service CouponService {
	rpc GetDiscount (GetDiscountRequest) returns (GetDiscountResponse);
}

message GetDiscountRequest {
	string CouponCode = 1;
	string TotalAmount = 2;
}

message GetDiscountResponse {
	bool Success = 1;
	string DiscountAmount = 2;
	string Message = 3;
}